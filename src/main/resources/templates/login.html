<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<form th:action="@{/api/login}" method="post">
    <h1><i class="fa fa-sign-in-alt"></i> Login Form</h1>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="example@mail.com" required/>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••••" required/>

    <button type="submit"></i> Login</button>

    <div class="text-center mt-3">
        <p>Don't have an account?</p>
        <a th:href="@{http://localhost:8080/register}"><i class="fa fa-user-plus"></i> Go to Register</a>
    </div>
</form>

<script th:inline="javascript">
    let errorMessage = [[${error}]];
    let successMessage = [[${success}]];

    if (errorMessage) {
        Toastify({
            text: errorMessage,
            duration: 4000,
            gravity: "top",
            position: "right",
            style: { background: "#dc3545" } // red
        }).showToast();
    }

    if (successMessage) {
        Toastify({
            text: successMessage,
            duration: 4000,
            gravity: "top",
            position: "right",
            style: { background: "#198754" } // green
        }).showToast();
    }
</script>

</body>
</html>
